<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Campus Lost & Found login page">
    <title>Login | Campus Lost & Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 9-2 2 2 2"/><path d="m15 9 2 2-2 2"/><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </div>
                <h1>Campus Lost & Found</h1>
                <p class="auth-subtitle">Welcome back. Sign in to manage your reports and matches.</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        <input type="email" id="email" name="email" placeholder="name@university.edu" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign in</button>

                <div id="errorMessage" class="alert alert-danger hidden" role="alert"></div>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Create one</a></p>
                <div class="footer-links">
                    <a href="about.html">About</a>
                    <span class="dot"></span>
                    <a href="index.html">Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const submitButton = document.getElementById('loginBtn');

            errorMessage.classList.add('hidden');

            if (!email || !password) {
                errorMessage.textContent = 'Please enter your email and password.';
                errorMessage.classList.remove('hidden');
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = 'Signing in...';

            try {
                const response = await AuthApi.login(email, password);

                if (response.ok && response.data.token) {
                    localStorage.setItem(Config.STORAGE_KEYS.TOKEN, response.data.token);
                    const userData = {
                        userId: response.data.userId,
                        userName: response.data.userName,
                        userEmail: response.data.userEmail
                    };
                    localStorage.setItem(Config.STORAGE_KEYS.USER, JSON.stringify(userData));
                    localStorage.setItem('userName', userData.userName || 'Student');
                    window.location.href = 'dashboard.html';
                    return;
                }

                errorMessage.textContent = response.data.message || 'Login failed. Please check your details.';
                errorMessage.classList.remove('hidden');
            } catch (error) {
                errorMessage.textContent = 'Unable to sign in right now. Please try again.';
                errorMessage.classList.remove('hidden');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Sign in';
            }
        });
    </script>
</body>
</html>
