services:
  # Backend API Service
  - type: web
    name: campus-lost-found-api
    runtime: node
    plan: free
    region: oregon
    
    # Build command
    buildCommand: |
      cd backend
      npm install
      npm run build || true
    
    # Start command
    startCommand: cd backend && npm start
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        value: /var/data/database.sqlite
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: CORS_ORIGIN
        value: "*"
    
    # Persistent storage for database and uploads
    disk:
      name: api_storage
      mountPath: /var/data
      sizeGB: 1

  # Frontend Static Service
  - type: web
    name: campus-lost-found-web
    runtime: node
    plan: free
    region: oregon
    
    # Build command
    buildCommand: npm install
    
    # Start frontend server
    startCommand: node frontend-server.js
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

